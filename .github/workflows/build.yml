# ============================================================
# VMP Build & Release
# 触发: push tag v* 或手动 workflow_dispatch
# 产物: CLI (win/linux) + GUI (win/linux) + NSIS installer
# ============================================================
name: Build & Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ── 1. 编译 ARM64 VM 解释器 blob ──────────────────────────
  stub:
    name: VM Stub
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install ARM64 toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu binutils-aarch64-linux-gnu

      - name: Compile stub
        run: |
          mkdir -p build/stub
          aarch64-linux-gnu-gcc \
            -c -Os -mcmodel=tiny -fno-stack-protector \
            -fno-builtin -nostdlib -march=armv8-a \
            -DVM_INDIRECT_DISPATCH -DVM_FUNC_SPLIT -DVM_TOKEN_ENTRY \
            stub/vm_interp_clean.c -o build/stub/vm_interp.o

          aarch64-linux-gnu-ld -T stub/vm_interp.lds \
            -o build/stub/vm_interp.elf build/stub/vm_interp.o

          aarch64-linux-gnu-objcopy -O binary \
            build/stub/vm_interp.elf build/vm_interp_raw.bin

      - name: Generate blob with symbol header
        run: |
          python3 << 'PYEOF'
          import struct, subprocess
          nm = subprocess.check_output(
              ['aarch64-linux-gnu-nm', 'build/stub/vm_interp.elf']
          ).decode()

          def find_sym(name):
              for line in nm.splitlines():
                  parts = line.split()
                  if len(parts) >= 3 and parts[2] == name:
                      return int(parts[0], 16)
              raise ValueError(f'Symbol {name} not found')

          off1 = find_sym('vm_entry')
          off2 = find_sym('vm_entry_token')
          off3 = find_sym('_token_table_va')
          hdr  = struct.pack('<QQQ', off1, off2, off3)
          raw  = open('build/vm_interp_raw.bin', 'rb').read()
          blob = hdr + raw
          open('build/vm_interp.bin', 'wb').write(blob)
          print(f'[+] vm_interp.bin: {len(blob)} bytes')
          print(f'    vm_entry=0x{off1:X}  vm_entry_token=0x{off2:X}  _token_table_va=0x{off3:X}')
          PYEOF

      - uses: actions/upload-artifact@v4
        with:
          name: vm-interp-blob
          path: build/vm_interp.bin

  # ── 2. CLI: Go 交叉编译 (win + linux) ─────────────────────
  cli:
    name: CLI (${{ matrix.goos }})
    needs: stub
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            ext: ''
          - goos: windows
            goarch: amd64
            ext: '.exe'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: actions/download-artifact@v4
        with:
          name: vm-interp-blob
          path: cmd/vmpacker/

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: |
          go build -trimpath -ldflags="-s -w" \
            -o vmpacker-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }} \
            ./cmd/vmpacker/

      - uses: actions/upload-artifact@v4
        with:
          name: cli-${{ matrix.goos }}
          path: vmpacker-*

  # ── 3. GUI Windows (Wails + NSIS) ─────────────────────────
  gui-windows:
    name: GUI (Windows)
    needs: stub
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: vmp-gui/go.mod

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: actions/download-artifact@v4
        with:
          name: vm-interp-blob
          path: vmp-gui/backend/api/

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build GUI + NSIS installer
        working-directory: vmp-gui
        run: wails build -nsis

      - uses: actions/upload-artifact@v4
        with:
          name: gui-windows
          path: vmp-gui/build/bin/*.exe

  # ── 4. GUI Linux (Wails) ──────────────────────────────────
  gui-linux:
    name: GUI (Linux)
    needs: stub
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: vmp-gui/go.mod

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: actions/download-artifact@v4
        with:
          name: vm-interp-blob
          path: vmp-gui/backend/api/

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential pkg-config \
            libgtk-3-dev libwebkit2gtk-4.0-dev

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build GUI
        working-directory: vmp-gui
        run: wails build

      - uses: actions/upload-artifact@v4
        with:
          name: gui-linux
          path: vmp-gui/build/bin/vmp-gui

  # ── 5. 发布 (仅 tag 触发) ─────────────────────────────────
  release:
    name: Release
    needs: [cli, gui-windows, gui-linux]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: '{cli,gui}-*'
          path: dist/
          merge-multiple: true

      - name: List release assets
        run: find dist/ -type f | sort

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*
